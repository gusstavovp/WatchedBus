<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Projeto - Scrumban Manager</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="projectApp">
        <!-- Header -->
        <header class="app-header" id="appHeader">
            <div class="header-left">
                <button class="btn-icon logo-btn" id="btnBack" title="Voltar">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="20" y1="12" x2="4" y2="12"></line>
                        <polyline points="10 18 4 12 10 6"></polyline>
                    </svg>
                </button>
                <h1 class="app-title">Scrumban Manager</h1>
                <nav class="breadcrumb" id="breadcrumb"></nav>
            </div>
            <div class="header-right">
                <span id="userDisplay" class="user-display"></span>
                <button class="btn-icon" id="btnLogout" title="Sair">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <!-- Conteúdo do projeto será renderizado aqui -->
        </main>

        <!-- Toast Notifications -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <!-- Modal Container -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <script src="js/utils/Storage.js"></script>
    <script src="js/Auth.js"></script>
    <script src="js/models/Project.js"></script>
    <script src="js/models/BacklogItem.js"></script>
    <script src="js/models/Sprint.js"></script>
    <script src="js/models/Ceremony.js"></script>
    <script src="js/views/HomeView.js"></script>
    <script src="js/views/ProjectView.js"></script>
    <script src="js/views/BacklogView.js"></script>
    <script src="js/views/SprintView.js"></script>
    <script src="js/views/KanbanView.js"></script>
    <script src="js/views/CeremonyView.js"></script>
    <script>
        // ========================================
        // PROJECT APP CONTROLLER
        // ========================================
        const ProjectApp = {
            projectId: null,
            currentUser: null,

            init() {
                // Verificar autenticação
                if (!Auth.requireAuth()) {
                    return;
                }

                this.currentUser = Auth.currentUser;
                this.updateUserDisplay();
                this.projectId = new URLSearchParams(window.location.search).get('id');

                if (!this.projectId) {
                    window.location.href = 'index.html';
                    return;
                }

                this.setupEventListeners();
                this.loadProject();
            },

            updateUserDisplay() {
                const userDisplay = document.getElementById('userDisplay');
                if (userDisplay && this.currentUser) {
                    userDisplay.textContent = `👤 ${this.currentUser.username}`;
                }
            },

            setupEventListeners() {
                document.getElementById('btnBack').addEventListener('click', () => {
                    window.location.href = 'index.html';
                });

                document.getElementById('btnLogout').addEventListener('click', () => {
                    if (confirm('Tem certeza que deseja sair?')) {
                        Auth.logout();
                    }
                });

                document.getElementById('modalOverlay').addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) {
                        this.closeModal();
                    }
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.closeModal();
                    }
                });
            },

            loadProject() {
                const project = Storage.getProject(this.projectId);
                if (!project) {
                    alert('Projeto não encontrado');
                    window.location.href = 'index.html';
                    return;
                }

                // Renderizar usando o ProjectView existente
                const main = document.getElementById('mainContent');
                main.innerHTML = ProjectView.render(this.projectId);
            },

            closeModal() {
                document.getElementById('modalOverlay').classList.remove('active');
            }
        };

        // Sobrescrever o App global para redirecionar corretamente
        const App = {
            navigateTo(view) {
                if (view === 'home') {
                    window.location.href = 'index.html';
                }
            },
            setBreadcrumb(items) {
                const breadcrumb = document.getElementById('breadcrumb');
                if (items.length === 0) {
                    breadcrumb.innerHTML = '';
                    return;
                }

                breadcrumb.innerHTML = items.map((item, idx) => {
                    if (item.current) {
                        return `<span class="breadcrumb-current">${HomeView.escapeHtml(item.label)}</span>`;
                    }
                    return `
                        <span class="breadcrumb-item" onclick="${item.action}">${HomeView.escapeHtml(item.label)}</span>
                        <span class="breadcrumb-separator">›</span>
                    `;
                }).join('');
            },
            showModal(title, content) {
                const overlay = document.getElementById('modalOverlay');
                const modal = document.getElementById('modalContent');

                modal.innerHTML = `
                    <div class="modal-header">
                        <h3>${title}</h3>
                        <button class="btn-icon" onclick="App.closeModal()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    ${content}
                `;

                overlay.classList.add('active');
            },
            closeModal() {
                document.getElementById('modalOverlay').classList.remove('active');
            },
            toast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;

                const icons = {
                    success: '✅',
                    error: '❌',
                    warning: '⚠️',
                    info: 'ℹ️'
                };

                toast.innerHTML = `
                    <span>${icons[type] || 'ℹ️'}</span>
                    <span class="toast-message">${message}</span>
                    <button class="toast-close" onclick="this.parentElement.remove()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                `;

                container.appendChild(toast);

                setTimeout(() => {
                    if (toast.parentElement) {
                        toast.style.opacity = '0';
                        toast.style.transform = 'translateX(100px)';
                        setTimeout(() => toast.remove(), 300);
                    }
                }, 4000);
            }
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            ProjectApp.init();
        });
    </script>
</body>
</html>
