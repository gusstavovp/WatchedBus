<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agile Project Manager - Scrumban</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header" id="appHeader">
            <div class="header-left">
                <button class="btn-icon logo-btn" id="btnHome" title="Início">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 17 12 22 22 17"></polyline>
                        <polyline points="2 12 12 17 22 12"></polyline>
                    </svg>
                </button>
                <h1 class="app-title">Scrumban Manager</h1>
                <nav class="breadcrumb" id="breadcrumb"></nav>
            </div>
            <div class="header-right">
                <span id="userDisplay" class="user-display"></span>
                <button class="btn-icon" id="btnLogout" title="Sair">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <!-- Views will be rendered here -->
        </main>

        <!-- Toast Notifications -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <!-- Modal Container -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <script src="js/utils/Storage.js"></script>
    <script src="js/Auth.js"></script>
    <script src="js/models/Project.js"></script>
    <script src="js/models/BacklogItem.js"></script>
    <script src="js/models/Sprint.js"></script>
    <script src="js/models/Ceremony.js"></script>
    <script src="js/views/HomeView.js"></script>
    <script src="js/views/ProjectView.js"></script>
    <script src="js/views/BacklogView.js"></script>
    <script src="js/views/SprintView.js"></script>
    <script src="js/views/KanbanView.js"></script>
    <script src="js/views/CeremonyView.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
